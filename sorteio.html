<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Pix Influência</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-sorteio {
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }

        .titulo-tela {
            color: #FFD700;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .box-premio {
            border: 1px solid #FFD700;
            border-radius: 12px;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.05);
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .box-premio p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box-premio h2 {
            margin: 0;
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .circulo-roleta {
            background: linear-gradient(135deg, #ff9800, #ffc107);
            border: 5px solid white;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
            transition: all 0.3s;
        }

        .btn-sortear {
            background: linear-gradient(90deg, #4CAF50, #2E8B57);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: 0.3s;
        }

        .btn-sortear:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-bloqueado {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            color: #aaa !important;
        }

        /* Container que vai segurar os ganhadores um em cima do outro */
        #listaGanhadores {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .resultado-box {
            background: #2a5298;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed #64b5f6;
            animation: fadeIn 0.5s;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="card-sorteio">
        <div class="titulo-tela">🏆 Tela de Sorteio</div>
        
        <div class="box-premio" id="boxPremioAtual">
            <p>Sorteando Agora:</p>
            <h2 id="nomePremioAtual">Conectando...</h2>
        </div>

        <div class="circulo-roleta" id="roleta">?</div>

        <button class="btn-sortear" id="btnSortear" onclick="iniciarSorteio()">🎲 Aguarde...</button>

        <div id="listaGanhadores"></div>
    </div>

    <script>
        // 🚨 COLE O SEU LINK DA API AQUI
        const API_URL = "https://script.google.com/macros/s/AKfycbyNqH8YqP7uzR42WYdSOoCzjWvt7_9ZpNXfNqBn4V4yxXzNRyqLRq-tN-vi0aToVmW-4w/exec"; 
        
        let edicaoEstaAberta = true;
        
        // NOVAS VARIÁVEIS DE CONTROLE DE FILA DE PRÊMIOS
        let listaPremios = [];
        let indicePremioAtual = 0;

        async function carregarDadosSorteio() {
            try {
                let resposta = await fetch(API_URL + "?action=getConfig");
                let config = await resposta.json();

                // LÓGICA DO CADEADO
                let statusEd = config.statusEdicao ? config.statusEdicao.toLowerCase() : "ativa";
                if (statusEd === "concluída" || statusEd === "concluida" || statusEd === "encerrada") {
                    edicaoEstaAberta = false;
                    bloquearTela("🚫 EDIÇÃO JÁ SORTEADA", "Sorteio Encerrado");
                    return; 
                }

                // Carrega a fila de prêmios configurados
                if (config.premios && config.premios.length > 0) {
                    listaPremios = config.premios; 
                    indicePremioAtual = 0;
                    atualizarVisorPremio(); // Mostra o 1º prêmio
                } else {
                    bloquearTela("🚫 NENHUM PRÊMIO CADASTRADO", "Sem prêmios");
                }

            } catch (erro) {
                document.getElementById('nomePremioAtual').innerText = "Erro de Conexão";
                console.error(erro);
            }
        }

        // Atualiza os textos da tela com base no prêmio da fila
        function atualizarVisorPremio() {
            let premio = listaPremios[indicePremioAtual];
            document.getElementById('nomePremioAtual').innerHTML = `${premio.icone} ${premio.titulo}: ${premio.nome}`;
            document.getElementById('btnSortear').innerHTML = `🎲 Sortear ${premio.titulo}`;
        }

        function bloquearTela(textoBotao, textoPremio) {
            let btn = document.getElementById('btnSortear');
            btn.innerText = textoBotao;
            btn.classList.add('btn-bloqueado');
            btn.disabled = true;
            document.getElementById('nomePremioAtual').innerText = textoPremio;
            document.getElementById('roleta').style.filter = "grayscale(100%)";
        }

        async function iniciarSorteio() {
            // Trava de segurança para não rodar se já acabou
            if (!edicaoEstaAberta || indicePremioAtual >= listaPremios.length) return; 

            let btn = document.getElementById('btnSortear');
            let roleta = document.getElementById('roleta');
            let premioAtual = listaPremios[indicePremioAtual];
            
            btn.disabled = true;
            btn.innerText = "Sorteando...";

            // Efeito visual
            let intervalo = setInterval(() => { roleta.innerText = Math.floor(Math.random() * 999) + 1; }, 50);

            try {
                let resposta = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "realizarSorteio" })
                });
                let resultado = await resposta.json();

                clearInterval(intervalo);

                if (resultado.success) {
                    roleta.innerText = resultado.numero;
                    
                    // Constrói o HTML do ganhador e coloca na tela
                    let htmlGanhador = `
                        <div class="resultado-box">
                            <p style="margin: 0 0 5px 0; color: #bbdefb; font-size: 14px;">${premioAtual.icone} GANHADOR(A) DO ${premioAtual.titulo.toUpperCase()} ${premioAtual.icone}</p>
                            <h3 style="margin: 0 0 5px 0; font-size: 22px; color: white;">${resultado.nome}</h3>
                            <p style="margin: 0 0 5px 0; color: #FFD700; font-weight: bold; font-size: 18px;">Bilhete Sorteado: ${resultado.numero}</p>
                            <p style="margin: 0; color: #fff; font-size: 14px;">WhatsApp: ${resultado.whatsapp}</p>
                        </div>
                    `;
                    // Insere o card novo no TOPO da lista de ganhadores
                    document.getElementById('listaGanhadores').insertAdjacentHTML('afterbegin', htmlGanhador);

                    // Avança a fila para o próximo prêmio
                    indicePremioAtual++;

                    if (indicePremioAtual < listaPremios.length) {
                        // Ainda tem prêmios para sortear
                        atualizarVisorPremio();
                        btn.disabled = false;
                    } else {
                        // Acabaram os prêmios
                        bloquearTela("🎉 TODOS OS PRÊMIOS SORTEADOS", "Sorteio Finalizado!");
                    }

                } else {
                    roleta.innerText = "X";
                    alert(resultado.message); // Ex: "Não há bilhetes Pagos"
                    btn.innerText = `🎲 Tentar Novamente (${premioAtual.titulo})`;
                    btn.disabled = false;
                }
            } catch (erro) {
                clearInterval(intervalo);
                roleta.innerText = "?";
                alert("Erro de conexão com o servidor. Tente novamente.");
                btn.innerText = `🎲 Sortear Novamente`;
                btn.disabled = false;
            }
        }

        carregarDadosSorteio();
    </script>
</body>
</html>
