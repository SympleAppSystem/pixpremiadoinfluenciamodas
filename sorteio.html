<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Pix Influência</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-sorteio {
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }

        .titulo-tela {
            color: #FFD700;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .box-premio {
            border: 1px solid #FFD700;
            border-radius: 12px;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.05);
            margin-bottom: 30px;
        }

        .box-premio p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box-premio h2 {
            margin: 0;
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .circulo-roleta {
            background: linear-gradient(135deg, #ff9800, #ffc107);
            border: 5px solid white;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
            transition: all 0.3s;
        }

        .btn-sortear {
            background: linear-gradient(90deg, #4CAF50, #2E8B57);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: 0.3s;
        }

        .btn-sortear:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .resultado-box {
            display: none;
            margin-top: 20px;
            background: #2a5298;
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #64b5f6;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilo para quando a edição estiver bloqueada */
        .btn-bloqueado {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            color: #aaa !important;
        }
    </style>
</head>
<body>

    <div class="card-sorteio">
        <div class="titulo-tela">🏆 Tela de Sorteio</div>
        
        <div class="box-premio">
            <p>Sorteando Agora:</p>
            <h2 id="nomePremioAtual">Carregando...</h2>
        </div>

        <div class="circulo-roleta" id="roleta">?</div>

        <button class="btn-sortear" id="btnSortear" onclick="iniciarSorteio()">🎲 Sortear Prêmio</button>

        <div class="resultado-box" id="resultadoFinal">
            <p style="margin: 0 0 5px 0; color: #bbdefb; font-size: 14px;">🎉 GANHADOR(A) 🎉</p>
            <h3 style="margin: 0 0 10px 0; font-size: 24px; color: white;" id="nomeGanhador">Nome do Cliente</h3>
            <p style="margin: 0; color: #fff; font-weight: bold;">WhatsApp: <span id="zapGanhador"></span></p>
        </div>
    </div>

    <script>
        // 🚨 COLE O SEU LINK DA API AQUI (O MESMO QUE USOU NO INDEX.HTML)
        const API_URL = "https://script.google.com/macros/s/AKfycbzyotIJ0Pisyfz0RjTZkFPgNkPox8lMBvXdDlXROI7cLGZFJHdmSfPbhe5d6a_8iIKmeQ/exec"; 
        
        let edicaoEstaAberta = true; // Variável do Cadeado

        async function carregarDadosSorteio() {
            try {
                document.getElementById('nomePremioAtual').innerText = "Conectando...";
                
                let resposta = await fetch(API_URL + "?action=getConfig");
                let config = await resposta.json();

                // LÓGICA DO CADEADO
                let statusEd = config.statusEdicao ? config.statusEdicao.toLowerCase() : "ativa";
                if (statusEd === "concluída" || statusEd === "concluida" || statusEd === "encerrada") {
                    edicaoEstaAberta = false;
                    let btn = document.getElementById('btnSortear');
                    btn.innerText = "🚫 EDIÇÃO JÁ SORTEADA";
                    btn.classList.add('btn-bloqueado');
                    btn.disabled = true;
                    document.getElementById('nomePremioAtual').innerText = "Sorteio Encerrado";
                    document.getElementById('roleta').style.filter = "grayscale(100%)";
                    return; // Para o código aqui, não carrega prêmios
                }

                // Se estiver ativa, carrega o prêmio normalmente
                if (config.premios && config.premios.length > 0) {
                    // Pega o 1º prêmio como padrão para o texto do botão
                    let premioPrincipal = config.premios[0].nome;
                    document.getElementById('nomePremioAtual').innerHTML = `🥇 1º Prêmio: ${premioPrincipal}`;
                    document.getElementById('btnSortear').innerHTML = `🎲 Sortear ${premioPrincipal.split(' ')[0]}`; // Pega só a primeira palavra pro botão
                } else {
                    document.getElementById('nomePremioAtual').innerText = "Nenhum prêmio cadastrado";
                }

            } catch (erro) {
                document.getElementById('nomePremioAtual').innerText = "Erro de Conexão";
                console.error(erro);
            }
        }

        async function iniciarSorteio() {
            if (!edicaoEstaAberta) return; // Trava de segurança extra

            let btn = document.getElementById('btnSortear');
            let roleta = document.getElementById('roleta');
            let resultadoBox = document.getElementById('resultadoFinal');
            
            btn.disabled = true;
            btn.innerText = "Sorteando...";
            resultadoBox.style.display = "none";

            // Efeito visual de rodar números
            let intervalo = setInterval(() => {
                roleta.innerText = Math.floor(Math.random() * 999) + 1;
            }, 50);

            try {
                let resposta = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "realizarSorteio" })
                });
                let resultado = await resposta.json();

                clearInterval(intervalo);

                if (resultado.success) {
                    roleta.innerText = resultado.numero;
                    document.getElementById('nomeGanhador').innerText = resultado.nome;
                    document.getElementById('zapGanhador').innerText = resultado.whatsapp;
                    resultadoBox.style.display = "block";
                    btn.innerText = "🎉 Sorteio Concluído";
                } else {
                    roleta.innerText = "X";
                    alert(resultado.message); // Ex: "Não há bilhetes Pagos"
                    btn.innerText = "🎲 Tentar Novamente";
                    btn.disabled = false;
                }
            } catch (erro) {
                clearInterval(intervalo);
                roleta.innerText = "?";
                alert("Erro de conexão com o servidor. Tente novamente.");
                btn.innerText = "🎲 Sortear Novamente";
                btn.disabled = false;
            }
        }

        carregarDadosSorteio();
    </script>
</body>
</html>
