<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio - Pix Influência</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-sorteio {
            background-color: #1e1e1e;
            border: 1px solid #444;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
        }

        .titulo-tela {
            color: #FFD700;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .box-premio {
            border: 1px solid #FFD700;
            border-radius: 12px;
            padding: 15px;
            background-color: rgba(255, 215, 0, 0.05);
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .box-premio p {
            margin: 0 0 5px 0;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box-premio h2 {
            margin: 0;
            font-size: 22px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .circulo-roleta {
            background: linear-gradient(135deg, #ff9800, #ffc107);
            border: 5px solid white;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
            transition: all 0.3s;
        }

        .btn-sortear {
            background: linear-gradient(90deg, #4CAF50, #2E8B57);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 18px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: 0.3s;
        }

        .btn-sortear:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-bloqueado {
            background: #555 !important;
            box-shadow: none !important;
            cursor: not-allowed !important;
            color: #aaa !important;
        }

        #listaGanhadores {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .resultado-box {
            background: #2a5298;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed #64b5f6;
            animation: fadeIn 0.5s;
            text-align: center;
        }

        .aviso-recuperacao {
            color: #ff9800;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            display: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="card-sorteio">
        <div class="titulo-tela">🏆 Tela de Sorteio</div>
        
        <div id="avisoRecuperacao" class="aviso-recuperacao">🔄 Sistema recuperado: Carregando sorteios anteriores...</div>

        <div class="box-premio" id="boxPremioAtual">
            <p>Sorteando Agora:</p>
            <h2 id="nomePremioAtual">Conectando...</h2>
        </div>

        <div class="circulo-roleta" id="roleta">?</div>

        <button class="btn-sortear" id="btnSortear" onclick="iniciarSorteio()">🎲 Aguarde...</button>

        <div id="listaGanhadores"></div>
    </div>

    <script>
        // 🚨 COLE O SEU LINK DA API DO NOVO DEPLOY AQUI
        const API_URL = "https://script.google.com/macros/s/AKfycbxSchtY6piSFFQEgylSUF-8JEOuIZo2XIU7kyOEDsLya1jKjRk1gmqQ7pHBMwBo_ANzvA/exec"; 
        
        let edicaoEstaAberta = true;
        let listaPremios = [];
        let indicePremioAtual = 0;

        async function carregarDadosSorteio() {
            try {
                let resposta = await fetch(API_URL + "?action=getInitialData");
                let dadosIniciais = await resposta.json();
                let config = dadosIniciais.config;
                let bilhetes = dadosIniciais.numbers;

                let statusEd = config.statusEdicao ? config.statusEdicao.toLowerCase() : "ativa";
                if (statusEd === "concluída" || statusEd === "concluida" || statusEd === "encerrada") {
                    edicaoEstaAberta = false;
                    bloquearTela("🚫 EDIÇÃO JÁ SORTEADA", "Sorteio Encerrado");
                    return; 
                }

                if (config.premios && config.premios.length > 0) {
                    listaPremios = config.premios; 

                    // Separa os bilhetes que já ganharam prêmios
                    let sorteados = bilhetes.filter(b => b.status.toLowerCase() === 'premiado');
                    let qtdJaSorteados = sorteados.length;

                    // 🚨 ALTERAÇÃO: RECUPERAÇÃO VISUAL DOS CARDS 🚨
                    if (qtdJaSorteados > 0) {
                        document.getElementById('avisoRecuperacao').style.display = 'block';
                        
                        // Recria os cards antigos com base nos prêmios que eles representam
                        sorteados.forEach((ganhador, idx) => {
                            let premioRef = listaPremios[idx];
                            if(premioRef) {
                                let htmlGanhador = `
                                    <div class="resultado-box">
                                        <p style="margin: 0 0 5px 0; color: #bbdefb; font-size: 14px;">${premioRef.icone} GANHADOR(A) DO ${premioRef.titulo.toUpperCase()} ${premioRef.icone}</p>
                                        <h3 style="margin: 0 0 5px 0; font-size: 22px; color: white;">${ganhador.nome}</h3>
                                        <p style="margin: 0 0 5px 0; color: #FFD700; font-weight: bold; font-size: 18px;">Bilhete Sorteado: ${ganhador.numero}</p>
                                        <p style="margin: 0; color: #fff; font-size: 14px;">WhatsApp: ${ganhador.whatsapp}</p>
                                    </div>
                                `;
                                // afterbegin empurra os cards antigos para baixo, deixando o mais recente no topo!
                                document.getElementById('listaGanhadores').insertAdjacentHTML('afterbegin', htmlGanhador);
                            }
                        });
                    }

                    indicePremioAtual = qtdJaSorteados;

                    if (indicePremioAtual >= listaPremios.length) {
                        bloquearTela("🎉 TODOS OS PRÊMIOS SORTEADOS", "Sorteio Finalizado!");
                    } else {
                        atualizarVisorPremio();
                    }
                } else {
                    bloquearTela("🚫 NENHUM PRÊMIO CADASTRADO", "Sem prêmios");
                }

            } catch (erro) {
                document.getElementById('nomePremioAtual').innerText = "Erro de Conexão";
                console.error(erro);
            }
        }

        function atualizarVisorPremio() {
            let premio = listaPremios[indicePremioAtual];
            document.getElementById('nomePremioAtual').innerHTML = `${premio.icone} ${premio.titulo}: ${premio.nome}`;
            document.getElementById('btnSortear').innerHTML = `🎲 Sortear ${premio.titulo}`;
        }

        function bloquearTela(textoBotao, textoPremio) {
            let btn = document.getElementById('btnSortear');
            btn.innerText = textoBotao;
            btn.classList.add('btn-bloqueado');
            btn.disabled = true;
            document.getElementById('nomePremioAtual').innerText = textoPremio;
            document.getElementById('roleta').style.filter = "grayscale(100%)";
        }

        async function iniciarSorteio() {
            if (!edicaoEstaAberta || indicePremioAtual >= listaPremios.length) return; 

            document.getElementById('avisoRecuperacao').style.display = 'none';

            let btn = document.getElementById('btnSortear');
            let roleta = document.getElementById('roleta');
            let premioAtual = listaPremios[indicePremioAtual];
            
            // 🚨 A MÁGICA ACONTECE AQUI: O site descobre se esse é o último prêmio da lista
            let ehUltimoSorteio = (indicePremioAtual + 1 === listaPremios.length);
            
            btn.disabled = true;
            btn.innerText = "Sorteando...";

            let intervalo = setInterval(() => { roleta.innerText = Math.floor(Math.random() * 999) + 1; }, 50);

            try {
                // Ele envia o pacote para o Google avisando se é a última rodada
                let resposta = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "realizarSorteio", ultimoSorteio: ehUltimoSorteio })
                });
                let resultado = await resposta.json();

                clearInterval(intervalo);

                if (resultado.success) {
                    roleta.innerText = resultado.numero;
                    
                    let htmlGanhador = `
                        <div class="resultado-box">
                            <p style="margin: 0 0 5px 0; color: #bbdefb; font-size: 14px;">${premioAtual.icone} GANHADOR(A) DO ${premioAtual.titulo.toUpperCase()} ${premioAtual.icone}</p>
                            <h3 style="margin: 0 0 5px 0; font-size: 22px; color: white;">${resultado.nome}</h3>
                            <p style="margin: 0 0 5px 0; color: #FFD700; font-weight: bold; font-size: 18px;">Bilhete Sorteado: ${resultado.numero}</p>
                            <p style="margin: 0; color: #fff; font-size: 14px;">WhatsApp: ${resultado.whatsapp}</p>
                        </div>
                    `;
                    document.getElementById('listaGanhadores').insertAdjacentHTML('afterbegin', htmlGanhador);

                    indicePremioAtual++; 

                    if (indicePremioAtual < listaPremios.length) {
                        atualizarVisorPremio();
                        btn.disabled = false;
                    } else {
                        // Como o Google já mudou o status para "Concluída" por trás dos panos,
                        // nós só travamos a tela de quem está assistindo!
                        bloquearTela("🎉 TODOS OS PRÊMIOS SORTEADOS", "Sorteio Finalizado!");
                    }

                } else {
                    roleta.innerText = "X";
                    alert(resultado.message); 
                    btn.innerText = `🎲 Tentar Novamente (${premioAtual.titulo})`;
                    btn.disabled = false;
                }
            } catch (erro) {
                clearInterval(intervalo);
                roleta.innerText = "?";
                alert("Erro de conexão com o servidor. Tente novamente.");
                btn.innerText = `🎲 Sortear Novamente`;
                btn.disabled = false;
            }
        }
        carregarDadosSorteio();
    </script>
</body>
</html>
