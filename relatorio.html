<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatório - Pix Influência</title>
    <style>
        @page { size: A4 landscape; margin: 15mm; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Menu de Controles (Select e Botão de Imprimir) */
        .controls-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #2a5298;}
        .select-group label { font-weight: bold; margin-right: 10px; color: #333; font-size: 16px;}
        .select-group select { padding: 10px 15px; border-radius: 6px; border: 1px solid #ccc; font-size: 15px; outline: none; min-width: 250px; font-weight: bold; color: #2a5298; cursor: pointer; background-color: #f9f9f9;}
        
        .btn-imprimir { padding: 12px 25px; background: #FFD700; color: #000; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.4); transition: 0.3s; }
        .btn-imprimir:hover { background: #e6c200; transform: translateY(-2px); }

        /* Cabeçalho do Relatório */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 3px solid #2a5298; padding-bottom: 15px; margin-bottom: 25px; }
        .header-titles h1 { text-transform: uppercase; font-size: 24px; font-weight: 900; color: #000; margin: 0 0 5px 0; letter-spacing: 1px; }
        .header-titles p { margin: 0; color: #2a5298; font-weight: bold; font-size: 16px; }
        .header-info { text-align: right; color: #666; font-size: 13px; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background-color: #2a5298; color: white; padding: 12px; font-weight: bold; text-align: center; text-transform: uppercase; border: 1px solid #1e3c72; }
        td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: middle; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .text-center { text-align: center; }
        .text-bold { font-weight: bold; }
        
        .status-pago { color: #2E8B57; font-weight: bold; background-color: #e8f5e9; }
        .status-reservado { color: #f39c12; font-weight: bold; background-color: #fdf2e9; }
        
        /* Quadros de Resumo Financeiro */
        .summary-wrapper { display: flex; justify-content: flex-end; gap: 20px; margin-top: 30px; }
        .summary-card { background: #fff; border: 1px solid #ddd; border-left: 6px solid #2a5298; padding: 15px 25px; border-radius: 8px; text-align: right; min-width: 200px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .summary-card.green { border-left-color: #2E8B57; }
        .summary-title { font-size: 12px; color: #777; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .summary-value { font-size: 26px; font-weight: 900; color: #333; }
        .summary-value.green-text { color: #2E8B57; }
        
        @media print { 
            body { background: white; padding: 0; margin: 0; }
            .container { box-shadow: none; padding: 0; }
            .controls-wrapper { display: none !important; } /* Esconde o menu e o botão ao imprimir */
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="controls-wrapper">
            <div class="select-group">
                <label for="edicaoSelect">📅 Edição:</label>
                <select id="edicaoSelect" onchange="mudarEdicao()">
                    <option value="">Carregando edições...</option>
                </select>
            </div>
            <button class="btn-imprimir" onclick="window.print()">🖨️ Imprimir Relatório</button>
        </div>

        <div class="header">
            <div class="header-titles">
                <h1>PIX INFLUÊNCIA</h1>
                <p id="titulo">Carregando Relatório...</p>
                <p style="font-size: 13px; color: #666; margin-top: 5px;">Edição Filtrada: <b id="nomeEdicaoFiltro">--</b></p>
            </div>
            <div class="header-info">
                Data de Emissão: <b id="dataAtual">--/--/----</b><br>
                Valor da Cota: <b>R$ 10,00</b>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 15%;">Nº dos Bilhetes</th>
                    <th style="width: 30%;">Nome do Cliente</th>
                    <th style="width: 15%;">WhatsApp</th>
                    <th style="width: 25%;">Data/Hora da Reserva</th>
                    <th style="width: 15%;">Status</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr><td colspan="5" class="text-center text-bold" style="padding: 30px;">Aguarde, conectando ao sistema...</td></tr>
            </tbody>
        </table>

        <div class="summary-wrapper" id="areaResumo" style="display: none;">
            <div class="summary-card">
                <div class="summary-title" id="lblQtd">Total de Bilhetes</div>
                <div class="summary-value" id="valQtd">0</div>
            </div>
            <div class="summary-card green">
                <div class="summary-title" id="lblFaturamento">Faturamento Total</div>
                <div class="summary-value green-text" id="valFaturamento">R$ 0,00</div>
            </div>
        </div>

    </div>

    <script>
        // 🚨 CONFIGURAÇÕES PREENCHIDAS
        const API_URL = "https://script.google.com/macros/s/AKfycbwhjR8kVVY4joEZ8EOxh2GPgUkc8cT5tCqdo3vD8ELOnuSppqsDFlnhnKp_Yhhzdb3oXg/exec";
        const VALOR_COTA = 10; 

        // Coloca a data atual no cabeçalho
        const hoje = new Date();
        document.getElementById('dataAtual').innerText = hoje.toLocaleDateString('pt-BR') + ' às ' + hoje.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

        // Função 1: Puxa as edições para montar o Menu Select
        async function inicializarPagina() {
            try {
                let resposta = await fetch(`${API_URL}?action=getEdicoes`);
                let edicoes = await resposta.json();
                
                let select = document.getElementById('edicaoSelect');
                select.innerHTML = ""; // Limpa o "Carregando..."

                if (edicoes.length === 0) {
                    select.innerHTML = '<option value="">Nenhuma edição encontrada na planilha</option>';
                    return;
                }

                // Preenche as opções
                edicoes.forEach(ed => {
                    let option = document.createElement('option');
                    option.value = ed;
                    option.text = ed;
                    select.appendChild(option);
                });

                // Verifica se o usuário já digitou alguma edição na URL do navegador
                const urlParams = new URLSearchParams(window.location.search);
                const edicaoNaUrl = urlParams.get('edicao');

                if (edicaoNaUrl && edicoes.includes(edicaoNaUrl)) {
                    select.value = edicaoNaUrl; // Seleciona a da URL
                } else {
                    select.value = edicoes[edicoes.length - 1]; // Se não tiver, seleciona a última (mais recente)
                }

                // Agora que sabemos a edição, puxamos o relatório
                carregarRelatorio(select.value);

            } catch (erro) {
                console.error(erro);
                document.getElementById('tabelaCorpo').innerHTML = "<tr><td colspan='5' class='text-center text-bold' style='color: red;'>Erro ao carregar lista de edições.</td></tr>";
            }
        }

        // Função 2: Executa quando o usuário escolhe outra opção no Menu Select
        function mudarEdicao() {
            const select = document.getElementById('edicaoSelect');
            const edicaoEscolhida = select.value;

            // Atualiza a URL visualmente para você poder favoritar ou enviar o link pra alguém já filtrado
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('edicao', edicaoEscolhida);
            window.history.replaceState({}, '', `${window.location.pathname}?${urlParams}`);

            // Mostra tela de carregamento na tabela
            document.getElementById('tabelaCorpo').innerHTML = "<tr><td colspan='5' class='text-center text-bold' style='padding: 30px;'>🔄 Mudando de edição... Aguarde.</td></tr>";
            
            carregarRelatorio(edicaoEscolhida);
        }

        // Função 3: O carregador do relatório principal (agora recebe a edição como parâmetro)
        async function carregarRelatorio(edicaoSelecionada) {
            const urlParams = new URLSearchParams(window.location.search);
            const tipo = urlParams.get('tipo') || 'todos';
            
            // Textos visuais
            let tituloRelatorio = "RELATÓRIO GERAL";
            let lblQtd = "Total de Bilhetes Listados";
            let lblFaturamento = "Valor Total (Bruto)";

            if (tipo === 'pagos') {
                tituloRelatorio = "RELATÓRIO DE BILHETES PAGOS";
                lblQtd = "Qtd. de Bilhetes Pagos";
                lblFaturamento = "Faturamento Confirmado";
            } else if (tipo === 'reservados') {
                tituloRelatorio = "RELATÓRIO DE RESERVAS PENDENTES";
                lblQtd = "Qtd. de Reservas";
                lblFaturamento = "Valor a Receber";
            }

            document.getElementById('titulo').innerText = tituloRelatorio;
            document.getElementById('nomeEdicaoFiltro').innerText = edicaoSelecionada;
            document.getElementById('lblQtd').innerText = lblQtd;
            document.getElementById('lblFaturamento').innerText = lblFaturamento;

            try {
                // Aqui fazemos a busca informando a edição pro Google Sheets!
                let resposta = await fetch(`${API_URL}?action=getReportData&tipo=${tipo}&edicao=${encodeURIComponent(edicaoSelecionada)}`);
                let dados = await resposta.json();
                
                let corpo = document.getElementById('tabelaCorpo');
                corpo.innerHTML = "";

                if (dados.length === 0) {
                    corpo.innerHTML = "<tr><td colspan='5' class='text-center text-bold' style='padding: 20px; color: #666;'>Nenhum registro encontrado para este filtro nesta edição.</td></tr>";
                    document.getElementById('areaResumo').style.display = 'none';
                    return;
                }

                let totalCotasReais = 0; 

                dados.forEach(item => {
                    let qtdCotasPessoa = item.quantidade || 1; 
                    totalCotasReais += qtdCotasPessoa;

                    let statusClasse = "";
                    let st = item.status.toString().trim().toLowerCase();
                    if (st === 'pago' || st === 'premiado') statusClasse = "status-pago";
                    else if (st === 'reservado') statusClasse = "status-reservado";

                    let exibicaoNumero = qtdCotasPessoa > 1 ? `${item.numero} <br><small><b>(${qtdCotasPessoa} cotas)</b></small>` : item.numero;

                    corpo.innerHTML += `
                        <tr>
                            <td class="text-center text-bold" style="font-size: 15px; line-height: 1.4;">${exibicaoNumero}</td>
                            <td class="text-bold">${item.nome}</td>
                            <td class="text-center">${item.whatsapp}</td>
                            <td class="text-center" style="color: #666;">${item.data}</td>
                            <td class="text-center ${statusClasse}">${item.status.toUpperCase()}</td>
                        </tr>
                    `;
                });

                let faturamento = totalCotasReais * VALOR_COTA;
                let faturamentoFormatado = faturamento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

                document.getElementById('valQtd').innerText = totalCotasReais;
                document.getElementById('valFaturamento').innerText = faturamentoFormatado;
                document.getElementById('areaResumo').style.display = 'flex';

            } catch (erro) {
                document.getElementById('tabelaCorpo').innerHTML = "<tr><td colspan='5' class='text-center text-bold' style='color: red;'>Erro ao carregar dados do Google.</td></tr>";
            }
        }

        // Inicia todo o processo assim que a tela abre!
        inicializarPagina();
    </script>
</body>
</html>
